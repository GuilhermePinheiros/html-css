<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        h1 {
            background-color: rgb(19, 196, 19);
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p{
            display: block;
            color: white;
            background-color: red;
            width: 300px;
            border: 10px solid black;
            text-align: center;
        }
        div:hover {
            color: red;
        }

        .especial:before{
            content: '>>';

        }
        
        .especial::after {
            content: '<<';
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mause sobre o texto abaixo</p>
    <div class="especial">
        Passe o mause aqui
        <p>TEXTO ESCONDIDO...</p>

    </div>
    <P>Fim do exemplo</P>
    
</body>
</html>
