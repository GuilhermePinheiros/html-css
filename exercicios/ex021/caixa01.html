<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /* box-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border: 30px groove rgb(57, 155, 155);

            padding: 10px ;

            margin: 20px auto 40px auto;




           
        }

        a { /* inline-level*/


            border: 15px groove rgb(1, 47, 255);

            padding: 10px ;

        }

        p {
            margin: auto 242px  ;
            border: 30px groove black;
  
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
